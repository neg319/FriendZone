name: Build FriendZone

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore packages
        run: dotnet restore Source/FriendZone/FriendZone.csproj

      - name: Build project
        run: dotnet build Source/FriendZone/FriendZone.csproj --configuration Release --no-restore

      - name: Package mod
        shell: pwsh
        run: |
          $staging = Join-Path $env:RUNNER_TEMP 'FriendZone'
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          robocopy . $staging /E /XD .git .github Source\FriendZone\bin Source\FriendZone\obj | Out-Null
          if (!(Test-Path (Join-Path $staging 'Assemblies\FriendZone.dll'))) {
            throw 'Build did not produce Assemblies\FriendZone.dll'
          }
          Compress-Archive -Path (Join-Path $staging '*') -DestinationPath FriendZone.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FriendZone
          path: FriendZone.zip
