name: Build FriendZone

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore packages
        run: dotnet restore Source/FriendZone/FriendZone.csproj

      - name: Build project
        run: dotnet build Source/FriendZone/FriendZone.csproj --configuration Release --no-restore

      - name: Package mod
        shell: pwsh
        run: |
          $staging = Join-Path $env:RUNNER_TEMP 'FriendZone'
          if (Test-Path $staging) {
            Remove-Item -Recurse -Force $staging
          }
          New-Item -ItemType Directory -Force -Path $staging | Out-Null

          if (!(Test-Path 'Assemblies/FriendZone.dll')) {
            throw 'Build did not produce Assemblies/FriendZone.dll'
          }

          $itemsToCopy = @('About', 'Defs', 'Languages', 'Textures', 'Assemblies', 'README.md')
          foreach ($item in $itemsToCopy) {
            if (Test-Path $item) {
              Copy-Item $item -Destination $staging -Recurse -Force
            }
          }

          Compress-Archive -Path (Join-Path $staging '*') -DestinationPath FriendZone.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FriendZone
          path: FriendZone.zip
